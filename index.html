<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slovak Grammar Drill</title>
<style>
:root {
  --bg: #f4f4ef;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #6b7280;
  --accent: #2563eb;
  --accent-bg: #dbeafe;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
  --err: #dc2626;
  --err-bg: #fee2e2;
  --border: #e5e7eb;
  --shadow: 0 2px 10px rgba(0,0,0,0.07);
  --r: 14px;
  --rs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100svh; display: flex; justify-content: center;
}
#app {
  width: 100%; max-width: 460px;
  padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; min-height: 100svh;
}

/* ── Screens ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ── Header ── */
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 6px 0 18px; }
.hdr h1 { font-size: 17px; font-weight: 700; }
.back-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px 4px 0; color: var(--text); }

/* ── Progress bar ── */
.prog { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 18px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .35s ease; }

/* ── Cards ── */
.card { background: var(--card); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); margin-bottom: 10px; }

/* ── Home hero ── */
.hero { text-align: center; padding: 28px 0 22px; }
.hero .flag { font-size: 44px; margin-bottom: 10px; }
.hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.hero p { color: var(--muted); font-size: 14px; line-height: 1.55; }

/* ── Stats grid ── */
.sgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.scard { background: var(--card); border-radius: var(--rs); padding: 14px 8px; text-align: center; box-shadow: var(--shadow); }
.scard .val { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; }
.scard .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

/* ── Weak points ── */
.weak-hdr { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
.weak-row { background: var(--card); border-radius: var(--rs); padding: 11px 14px; margin-bottom: 6px;
  display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
.weak-row .topic { font-size: 13px; font-weight: 500; flex: 1; margin-right: 10px; }
.dots { display: flex; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.on { background: var(--accent); }
.dot.bad { background: var(--err); }

/* ── Buttons ── */
.btn { display: block; width: 100%; padding: 15px; border-radius: var(--r); border: none;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: transform .12s; text-align: center; }
.btn:active { transform: scale(.98); }
.btn-p { background: var(--accent); color: #fff; margin-bottom: 10px; }
.btn-s { background: var(--card); color: var(--text); box-shadow: var(--shadow); margin-bottom: 10px; }

/* ── Answer options ── */
.opts { display: grid; gap: 8px; margin-top: 14px; }
.opt { background: var(--card); border: 2px solid var(--border); border-radius: var(--rs);
  padding: 13px 14px; display: flex; align-items: center; gap: 11px;
  cursor: pointer; font-size: 16px; transition: border-color .12s, background .12s; }
.opt:active:not(:disabled) { transform: scale(.99); }
.opt-lbl { width: 24px; height: 24px; border-radius: 50%; background: var(--bg); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); }
.opt.ok { background: var(--ok-bg); border-color: var(--ok); }
.opt.ok .opt-lbl { background: var(--ok); color: #fff; }
.opt.err { background: var(--err-bg); border-color: var(--err); }
.opt.err .opt-lbl { background: var(--err); color: #fff; }
.opt:disabled { cursor: default; }

/* ── Question card ── */
.tag { display: inline-block; background: var(--accent-bg); color: var(--accent);
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 14px; }
.qsent { font-size: 20px; line-height: 1.55; font-weight: 500; }
.blank { display: inline-block; min-width: 72px; border-bottom: 3px solid var(--accent);
  padding: 0 3px; color: transparent; user-select: none; }
.qtrans { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 7px; }

/* ── Mode toggle ── */
.mode-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.mode-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer;
  text-decoration: underline; padding: 3px; }

/* ── Type input ── */
.type-row { display: flex; gap: 8px; margin-top: 12px; }
.type-in { flex: 1; border: 2px solid var(--border); border-radius: var(--rs);
  padding: 13px 14px; font-size: 16px; outline: none; transition: border-color .15s; }
.type-in:focus { border-color: var(--accent); }
.type-in.ok { border-color: var(--ok); background: var(--ok-bg); }
.type-in.err { border-color: var(--err); background: var(--err-bg); }
.check-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--rs);
  padding: 13px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* ── Feedback ── */
.fb { border-radius: var(--r); padding: 18px; margin-top: 10px;
  animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fb.ok { background: var(--ok-bg); border: 1px solid var(--ok); }
.fb.err { background: var(--err-bg); border: 1px solid var(--err); }
.fb-result { font-size: 15px; font-weight: 700; margin-bottom: 11px; }
.fb-result.ok { color: var(--ok); }
.fb-result.err { color: var(--err); }
.fb-sent { font-size: 16px; font-weight: 500; padding: 11px; background: rgba(255,255,255,.7);
  border-radius: var(--rs); margin-bottom: 10px; line-height: 1.5; }
.ans { color: var(--ok); font-weight: 700; text-decoration: underline; text-decoration-color: var(--ok); }
.fb-rule { font-size: 13px; line-height: 1.65; color: var(--text); }
.fb-notes { font-size: 12px; color: var(--muted); line-height: 1.55;
  padding-top: 8px; border-top: 1px solid rgba(0,0,0,.1); margin-top: 8px; }

/* ── Session header extras ── */
.sess-info { font-size: 13px; color: var(--muted); }
.streak { display: inline-flex; align-items: center; gap: 3px;
  background: #fef3c7; color: #d97706; border-radius: 20px; padding: 3px 9px; font-size: 12px; font-weight: 700; }

/* ── Summary ── */
.sum-score { text-align: center; padding: 18px 0 14px; }
.sum-pct { font-size: 60px; font-weight: 800; color: var(--accent); line-height: 1; }
.sum-frac { font-size: 16px; color: var(--muted); margin-top: 3px; }
.sum-msg { font-size: 14px; line-height: 1.6; margin-bottom: 16px; }

/* ── Set sections ── */
.set-hdr { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: .5px; margin: 16px 0 8px; }
.btn-vocab { background: var(--ok); }
</style>
</head>
<body>
<div id="app">

  <!-- ═══ HOME ═══ -->
  <div id="home" class="screen">
    <div class="hdr"><h1>Slovak Drill</h1><span style="font-size:26px">🇸🇰</span></div>
    <div class="set-hdr">Grammar Drill</div>
    <div class="sgrid">
      <div class="scard"><div class="val" id="s-done">0</div><div class="lbl">Answered</div></div>
      <div class="scard"><div class="val" id="s-acc">—</div><div class="lbl">Accuracy</div></div>
      <div class="scard"><div class="val" id="s-mastered">0</div><div class="lbl">Mastered</div></div>
    </div>
    <div id="weak-sec" style="margin-bottom:10px;display:none">
      <div class="weak-hdr">Needs Work</div>
      <div id="weak-list"></div>
    </div>
    <button class="btn btn-p" onclick="startSession('grammar')">Grammar Drill (10 questions)</button>

    <div class="set-hdr">Vocabulary Practice</div>
    <div class="sgrid">
      <div class="scard"><div class="val" id="v-done">0</div><div class="lbl">Answered</div></div>
      <div class="scard"><div class="val" id="v-acc">—</div><div class="lbl">Accuracy</div></div>
      <div class="scard"><div class="val" id="v-mastered">0</div><div class="lbl">Mastered</div></div>
    </div>
    <button class="btn btn-p btn-vocab" onclick="startSession('vocab')">Vocabulary Practice (10 questions)</button>

    <button class="btn btn-s" onclick="if(confirm('Reset all progress?')){resetProg();}">Reset Progress</button>
  </div>

  <!-- ═══ QUIZ ═══ -->
  <div id="quiz" class="screen">
    <div class="hdr">
      <button class="back-btn" onclick="endSession()">←</button>
      <span class="sess-info" id="q-count"></span>
      <span id="streak-el"></span>
    </div>
    <div class="prog"><div class="prog-fill" id="prog-fill"></div></div>

    <div class="mode-row">
      <button class="mode-btn" id="trans-tog" onclick="toggleTrans()">Hide translation</button>
      <button class="mode-btn" onclick="toggleMode()">Switch to <span id="mode-lbl">typed input</span></button>
    </div>

    <div class="card">
      <div class="tag" id="q-tag"></div>
      <div class="qsent" id="q-sent"></div>
      <div class="qtrans" id="q-trans"></div>
      <div class="opts" id="mc-opts"></div>
      <div class="type-row" id="type-row" style="display:none">
        <input id="type-in" class="type-in" placeholder="Type your answer…"
          onkeydown="if(event.key==='Enter')checkTyped()">
        <button class="check-btn" onclick="checkTyped()">Check</button>
      </div>
    </div>

    <div id="fb-area"></div>
    <button class="btn btn-p" id="next-btn" style="display:none;margin-top:10px" onclick="nextQ()">Continue →</button>
  </div>

  <!-- ═══ SUMMARY ═══ -->
  <div id="summary" class="screen">
    <div class="hdr"><h1>Session Complete</h1></div>
    <div class="card">
      <div class="sum-score">
        <div class="sum-pct" id="sum-pct">0%</div>
        <div class="sum-frac" id="sum-frac"></div>
      </div>
    </div>
    <div class="card" id="sum-detail"></div>
    <button class="btn btn-p" onclick="startSession()">Another Session</button>
    <button class="btn btn-s" onclick="showHome()">Home</button>
  </div>

</div><!-- #app -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// QUESTIONS
// Each: id, tag, sentence (contains ___), answer, distractors[3],
//       full (HTML with <b class="ans">answer</b>), translation, rule, notes
// ─────────────────────────────────────────────────────────────────────────────
const QS = [

  // ── stáť za ──────────────────────────────────────────────────────────────
  { id:"stv1", tag:"stáť za",
    sentence:"Stojí to ___ to.",
    answer:"za", distractors:["do","na","pre"],
    full:"Stojí to <b class='ans'>za</b> to.", translation:"It is worth it.",
    rule:"<b>stáť za + accusative</b> = to be worth X. <em>Za</em> is always the preposition; any accusative noun fills the slot after it: stáť za úsilie, za pozornosť.",
    notes:"Learners often think 'to' is part of the phrase — it's just the default pronoun for 'it'. The essential word is <em>za</em>." },

  { id:"stv2", tag:"stáť za",
    sentence:"Nestojí to za ___.",
    answer:"nič", distractors:["nikto","nikde","nikdy"],
    full:"Nestojí to za <b class='ans'>nič</b>.", translation:"It is worth nothing.",
    rule:"<b>stáť za + accusative.</b> <em>Nič</em> (nothing) fills the accusative slot here as the measure of worth.",
    notes:"Compare: nestojí to za zmienku = it's not worth mentioning; stojí to za úsilie = it's worth the effort." },

  { id:"stv3", tag:"stáť za",
    sentence:"Stojí to ___ námahu?",
    answer:"za", distractors:["do","na","pre"],
    full:"Stojí to <b class='ans'>za</b> námahu?", translation:"Is it worth the trouble?",
    rule:"<b>stáť za + accusative.</b> The preposition is always <em>za</em> — it never varies. What follows can be any accusative noun.",
    notes:"" },

  // ── treba + infinitive ────────────────────────────────────────────────────
  { id:"trb1", tag:"treba + infinitive",
    sentence:"Okrem gramatiky treba ___ aj kultúru.",
    answer:"poznať", distractors:["poznáš","poznajú","poznáme"],
    full:"Okrem gramatiky treba <b class='ans'>poznať</b> aj kultúru.", translation:"Besides grammar, one also needs to know culture.",
    rule:"<b>treba is impersonal</b> — it takes an <em>infinitive</em> directly, never a conjugated verb. It means 'it is necessary / one needs to'.",
    notes:"treba poznáš is ungrammatical. Compare: musíš poznať (you must know — personal) vs treba poznať (one needs to know — impersonal)." },

  { id:"trb2", tag:"treba + infinitive",
    sentence:"Treba to ___.",
    answer:"vedieť", distractors:["vie","viem","vedia"],
    full:"Treba to <b class='ans'>vedieť</b>.", translation:"One needs to know this.",
    rule:"<b>treba + infinitive.</b> Infinitives end in <em>-ť</em>. Conjugated forms (vie, viem, vedia) are never possible after treba.",
    notes:"The 'you' in English translations is just how English handles impersonals — there is no subject in the Slovak." },

  // ── Aspect ───────────────────────────────────────────────────────────────
  { id:"asp1", tag:"Aspect: imperfective vs perfective",
    sentence:"Ona ___ a povedala: Uži si to, kým môžeš.",
    answer:"usmievala sa", distractors:["usmiala sa","usmeje sa","usmieva sa"],
    full:"Ona <b class='ans'>usmievala sa</b> a povedala: Uži si to, kým môžeš.", translation:"She was smiling and said: Enjoy it while you can.",
    rule:"<b>Imperfective past = ongoing background state.</b> <em>Usmievala sa</em> (imperfective) = she was in a state of smiling while she spoke. <em>Usmiala sa</em> (perfective) would be a single flash of a smile — a completed event.",
    notes:"Use imperfective when the action is the backdrop/context for something else. Use perfective for a discrete event." },

  { id:"asp2", tag:"Aspect: imperfective vs perfective",
    sentence:"Vybehol z domu a ___.",
    answer:"kričal", distractors:["zakričal","kričí","kričíme"],
    full:"Vybehol z domu a <b class='ans'>kričal</b>.", translation:"He ran out of the house shouting.",
    rule:"<b>Perfective + a + imperfective.</b> <em>Vybehol</em> (perf) = the single event of running out. <em>Kričal</em> (imperf) = the shouting was ongoing before, during, and after. <em>Zakričal</em> would mean one single shout.",
    notes:"Slovak 'verb + a + imperfective verb' → English 'verb + -ing participle'. The <em>a</em> is neutral — the verb aspects do all the work." },

  { id:"asp3", tag:"Aspect: imperfective vs perfective",
    sentence:"Snažím sa ___ každý problém hneď.",
    answer:"riešiť", distractors:["vyriešiť","riešenie","vyriešenie"],
    full:"Snažím sa <b class='ans'>riešiť</b> každý problém hneď.", translation:"I try to deal with every problem immediately.",
    rule:"<b>riešiť (imperfective)</b> = the ongoing process of handling/grappling. <em>Vyriešiť (perfective)</em> = to solve/resolve completely. 'Trying to deal with' is a process, not a completed outcome.",
    notes:"imperfective riešiť = dealing with; perfective vyriešiť = having solved. Same distinction applies to other verb pairs." },

  { id:"asp4", tag:"Aspect: imperfective vs perfective",
    sentence:"Ešte som ne___.",
    answer:"dojedol", distractors:["jedol","jedal","zjedol"],
    full:"Ešte som ne<b class='ans'>dojedol</b>.", translation:"I haven't finished eating yet (but I will).",
    rule:"<b>ešte + negative perfective past</b> = not yet completed, but intending to. The <em>do-</em> prefix on dojesť means eating-to-completion. The negative perfective = that completion hasn't happened yet.",
    notes:"Nedojedol ≠ nejedol. Nedojedol = didn't finish eating. Nejedol = didn't eat at all. The prefix do- is the key." },

  // ── nič vs žiadny ─────────────────────────────────────────────────────────
  { id:"nic1", tag:"nič vs žiadny",
    sentence:"Nepijem ___.",
    answer:"nič", distractors:["žiadny","žiadne","žiadna"],
    full:"Nepijem <b class='ans'>nič</b>.", translation:"I drink nothing.",
    rule:"<b>nič = nothing (pronoun)</b> — stands alone, replaces a noun entirely. No noun follows nič.",
    notes:"Compare: nepijem nič (I drink nothing — nič stands alone) vs nepijem žiadny čaj (I drink no tea — žiadny modifies čaj)." },

  { id:"nic2", tag:"nič vs žiadny",
    sentence:"Nepijem ___ čaj.",
    answer:"žiadny", distractors:["nič","žiadne","žiadna"],
    full:"Nepijem <b class='ans'>žiadny</b> čaj.", translation:"I drink no tea.",
    rule:"<b>žiadny = no/not any (determiner)</b> — modifies a noun. <em>Žiadny</em> is masculine (čaj is masculine). It agrees with the noun in gender: žiadny (masc), žiadna (fem), žiadne (neuter).",
    notes:"nič would leave čaj without a determiner. žiadny is the Slovak equivalent of 'no' as an adjective — extremely high-frequency." },

  { id:"nic3", tag:"nič vs žiadny",
    sentence:"___ neboli v obchode.",
    answer:"Žiadne", distractors:["Nič","Nikto","Nikde"],
    full:"<b class='ans'>Žiadne</b> neboli v obchode.", translation:"There weren't any in the shop.",
    rule:"<b>žiadne (neuter plural)</b> = there weren't any of the specific things being discussed. <em>Nič</em> would mean 'nothing at all existed' — a stronger, different statement.",
    notes:"žiadne here refers back to an implied noun (the specific product). Nič would be absolute: nothing whatsoever was in the shop." },

  { id:"nic4", tag:"nič vs žiadny",
    sentence:"Nie je ___ problém.",
    answer:"žiadny", distractors:["nič","nikto","nikdy"],
    full:"Nie je <b class='ans'>žiadny</b> problém.", translation:"There is no problem.",
    rule:"<b>žiadny (masculine)</b> modifies <em>problém</em>. Compare: Nie je nič (pronoun, standalone) vs Nie je žiadny problém (adjective modifying a noun).",
    notes:"Paradigm: žiadny problém (masc), žiadna šanca (fem), žiadne peniaze (neuter pl), žiadni ľudia (masc anim pl)." },

  // ── Double negative ───────────────────────────────────────────────────────
  { id:"dbl1", tag:"Double negative",
    sentence:"Celú noc nepovedal ani ___.",
    answer:"slovo", distractors:["slové","slovom","slovách"],
    full:"Celú noc nepovedal ani <b class='ans'>slovo</b>.", translation:"He didn't say a single word all night.",
    rule:"<b>ani = 'not even a single'.</b> It intensifies the negation. The verb must also be negative (nepovedal). Slovo stays in accusative (neuter acc = nom form).",
    notes:"ani is the negative pole of the aj/ani pair: ani jeden (not a single one), ani raz (not once), ani trochu (not even a little), ani neviem (I don't even know)." },

  { id:"dbl2", tag:"Double negative",
    sentence:"Čakali sme hodinu pri vchode, ale nikto ___.",
    answer:"neprišiel", distractors:["prišiel","príde","prichádza"],
    full:"Čakali sme hodinu pri vchode, ale nikto <b class='ans'>neprišiel</b>.", translation:"We waited an hour at the entrance, but nobody came.",
    rule:"<b>Double negative is obligatory in Slovak.</b> When a negative word (nikto, nič, nikdy, žiadny, ani) is present, the verb must also be negated. 'Nikto prišiel' is ungrammatical.",
    notes:"Rule: if there's a negative word in the sentence, the verb must also carry ne-. This applies to: nikto, nič, nikdy, nikde, žiadny, ani — always." },

  // ── sa vs si ──────────────────────────────────────────────────────────────
  { id:"sas1", tag:"Reflexive: sa vs si",
    sentence:"Každý deň ___ učím niečo nové.",
    answer:"sa", distractors:["si","mu","jej"],
    full:"Každý deň <b class='ans'>sa</b> učím niečo nové.", translation:"Every day I learn something new.",
    rule:"<b>sa = reflexive accusative.</b> učiť sa = teach oneself = learn. Sa is fixed for this verb — inseparable.",
    notes:"The choice sa vs si is fixed per verb and cannot be swapped. Verbs taking si tend to involve internalising something into your own mind." },

  { id:"sas2", tag:"Reflexive: sa vs si",
    sentence:"Každý deň ___ tiež uvedomujem, čo ešte neviem.",
    answer:"si", distractors:["sa","mu","ho"],
    full:"Každý deň <b class='ans'>si</b> tiež uvedomujem, čo ešte neviem.", translation:"Every day I also realise what I still don't know.",
    rule:"<b>si = reflexive dative.</b> uvedomiť si = make oneself aware = to realise. Si is fixed for this verb — it signals internalising something into your own awareness.",
    notes:"Key si verbs: uvedomiť si, predstaviť si, pamätať si, myslieť si, všimnúť si, zapamätať si, užiť si, pozrieť si." },

  { id:"sas3", tag:"Reflexive: sa vs si",
    sentence:"Neviem ___ to predstaviť.",
    answer:"si", distractors:["sa","mu","jej"],
    full:"Neviem <b class='ans'>si</b> to predstaviť.", translation:"I can't picture / imagine it.",
    rule:"<b>predstaviť si</b> = to imagine (presenting internally to your own mind). Without si: predstaviť niekoho = to introduce someone to others. The si completely changes the meaning.",
    notes:"Related: predstava = mental image/notion (nemám ani predstavu = I have no idea whatsoever — very common phrase)." },

  { id:"sas4", tag:"Reflexive: sa vs si",
    sentence:"Zobral som ___ príliš veľa.",
    answer:"si", distractors:["sa","ho","to"],
    full:"Zobral som <b class='ans'>si</b> príliš veľa.", translation:"I took on too much.",
    rule:"<b>Dative si of benefit (optional).</b> Any transitive verb + si means the action is for your own benefit. Zobrať si = take on/take for yourself. Zobrať (without si) = take physically.",
    notes:"Same pattern: kúpiť si (buy for yourself), urobiť si (make for yourself), dať si kávu (have a coffee). This si is optional — adding it shifts the meaning toward 'onto myself'." },

  // ── ešte vs stále ─────────────────────────────────────────────────────────
  { id:"est1", tag:"ešte vs stále",

// ─────────────────────────────────────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────────────────────────────────────
const GRAM_KEY  = "sk_drill_v1";
const VOCAB_KEY = "sk_vocab_v1";
let ACTIVE_KEY = GRAM_KEY;

function loadFromKey(k) {
  try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fresh(); }
  catch { return fresh(); }
}
function load() { return loadFromKey(ACTIVE_KEY); }
function fresh() { return { scores: {}, answered: 0, correct: 0 }; }
function save(s) { localStorage.setItem(ACTIVE_KEY, JSON.stringify(s)); }
function score(s, id) { return s.scores[id] ?? 0; }
function updateScore(s, id, ok) {
  const c = score(s, id);
  s.scores[id] = ok ? Math.min(5, c + 1) : Math.max(0, c - 2);
  s.answered = (s.answered || 0) + 1;
  if (ok) s.correct = (s.correct || 0) + 1;
  save(s);
}

// ─────────────────────────────────────────────────────────────────────────────
// QUESTION SELECTION  (weighted random, avoids recent)
// ─────────────────────────────────────────────────────────────────────────────
function weight(sc) { return [10, 7, 4, 2, 1, 0.5][Math.min(sc, 5)]; }

function pick(state, recent) {
  const pool = ACTIVE_QS.filter(q => !recent.includes(q.id));
  const arr = pool.length ? pool : ACTIVE_QS;
  const total = arr.reduce((s, q) => s + weight(score(state, q.id)), 0);
  let r = Math.random() * total;
  for (const q of arr) { r -= weight(score(state, q.id)); if (r <= 0) return q; }
  return arr[arr.length - 1];
}

// ─────────────────────────────────────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────────────────────────────────────
let ACTIVE_QS = QS;
let APP = load();
let SES = { done: 0, ok: 0, streak: 0, recent: [] };
let CUR = null;
let MODE = "mc"; // "mc" | "type"
let DONE = false;
let HIDE_TRANS = false;
const SES_LEN = 10;

// ─────────────────────────────────────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showHome() { refreshHome(); show("home"); }

function refreshHome() {
  const gapp = loadFromKey(GRAM_KEY);
  const vapp = loadFromKey(VOCAB_KEY);

  const gtot = gapp.answered || 0, gok = gapp.correct || 0;
  const gmas = QS.filter(q => (gapp.scores[q.id] ?? 0) >= 4).length;
  document.getElementById("s-done").textContent = gtot;
  document.getElementById("s-acc").textContent  = gtot ? Math.round(gok / gtot * 100) + "%" : "—";
  document.getElementById("s-mastered").textContent = gmas;

  const vtot = vapp.answered || 0, vok = vapp.correct || 0;
  const vmas = VQS.filter(q => (vapp.scores[q.id] ?? 0) >= 4).length;
  document.getElementById("v-done").textContent = vtot;
  document.getElementById("v-acc").textContent  = vtot ? Math.round(vok / vtot * 100) + "%" : "—";
  document.getElementById("v-mastered").textContent = vmas;

  const weakItems = QS
    .filter(q => gapp.scores[q.id] !== undefined && (gapp.scores[q.id] ?? 0) <= 1)
    .sort((a, b) => (gapp.scores[a.id] ?? 0) - (gapp.scores[b.id] ?? 0))
    .slice(0, 5);
  const sec = document.getElementById("weak-sec");
  if (weakItems.length) {
    sec.style.display = "";
    document.getElementById("weak-list").innerHTML = weakItems.map(q => {
      const sc = gapp.scores[q.id] ?? 0;
      const dots = [0,1,2,3,4].map(i =>
        `<div class="dot ${i < sc ? 'on' : (sc === 0 ? 'bad' : '')}"></div>`).join("");
      return `<div class="weak-row"><div class="topic">${q.tag}</div><div class="dots">${dots}</div></div>`;
    }).join("");
  } else { sec.style.display = "none"; }
}

function resetProg() {
  localStorage.removeItem(GRAM_KEY);
  localStorage.removeItem(VOCAB_KEY);
  APP = fresh();
  refreshHome();
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION
// ─────────────────────────────────────────────────────────────────────────────
function startSession(type) {
  if      (type === 'vocab')   { ACTIVE_QS = VQS; ACTIVE_KEY = VOCAB_KEY; }
  else if (type === 'grammar') { ACTIVE_QS = QS;  ACTIVE_KEY = GRAM_KEY;  }
  // no type = re-use current active set (e.g. "Another Session" button)
  APP = load();
  SES = { done: 0, ok: 0, streak: 0, recent: [] };
  show("quiz");
  nextQ();
}

function endSession() { SES.done > 0 ? showSummary() : showHome(); }

function nextQ() {
  DONE = false;
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("fb-area").innerHTML = "";

  if (SES.done >= SES_LEN) { showSummary(); return; }

  CUR = pick(APP, SES.recent);
  SES.recent.push(CUR.id);
  if (SES.recent.length > 8) SES.recent.shift();

  renderQ();
  updateProgress();
}

function updateProgress() {
  document.getElementById("prog-fill").style.width = (SES.done / SES_LEN * 100) + "%";
  document.getElementById("q-count").textContent = `${SES.done}/${SES_LEN}`;
  document.getElementById("streak-el").innerHTML =
    SES.streak >= 3 ? `<span class="streak">🔥 ${SES.streak}</span>` : "";
}

function renderQ() {
  const tagEl = document.getElementById("q-tag");
  if (ACTIVE_QS === VQS) { tagEl.style.display = "none"; }
  else { tagEl.style.display = ""; tagEl.textContent = CUR.tag; }
  document.getElementById("q-sent").innerHTML =
    CUR.sentence.replace("___", "<span class='blank'>___</span>");
  const transEl = document.getElementById("q-trans");
  transEl.textContent = CUR.translation;
  transEl.style.display = HIDE_TRANS ? "none" : "";
  document.getElementById("trans-tog").textContent = HIDE_TRANS ? "Show translation" : "Hide translation";

  const mc = document.getElementById("mc-opts");
  const tr = document.getElementById("type-row");
  document.getElementById("mode-lbl").textContent = MODE === "mc" ? "typed input" : "multiple choice";

  if (MODE === "mc") {
    mc.style.display = ""; tr.style.display = "none";
    const opts = shuffle([CUR.answer, ...CUR.distractors.slice(0, 3)]);
    const esc = s => s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    mc.innerHTML = opts.map((o, i) => `
      <button class="opt" data-val="${esc(o)}" onclick="checkMC(this.dataset.val, this)">
        <div class="opt-lbl">${"ABCD"[i]}</div><div>${o}</div>
      </button>`).join("");
  } else {
    mc.style.display = "none"; tr.style.display = "";
    const inp = document.getElementById("type-in");
    inp.value = ""; inp.disabled = false;
    inp.className = "type-in";
    setTimeout(() => inp.focus(), 80);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ANSWER CHECKING
// ─────────────────────────────────────────────────────────────────────────────
function checkMC(chosen, btn) {
  if (DONE) return;
  DONE = true;
  const ok = chosen === CUR.answer;
  handleAnswer(ok);
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    const txt = b.querySelector("div:last-child").textContent;
    if (txt === CUR.answer) b.classList.add("ok");
    else if (b === btn && !ok) b.classList.add("err");
  });
}

function checkTyped() {
  if (DONE) return;
  const inp = document.getElementById("type-in");
  const val = inp.value.trim();
  if (!val) return;
  DONE = true;
  const ok = val.toLowerCase() === CUR.answer.toLowerCase();
  inp.disabled = true;
  inp.classList.add(ok ? "ok" : "err");
  handleAnswer(ok);
}

function handleAnswer(ok) {
  updateScore(APP, CUR.id, ok);
  SES.done++;
  if (ok) { SES.ok++; SES.streak++; } else { SES.streak = 0; }
  showFeedback(ok);
  updateProgress();
  const nb = document.getElementById("next-btn");
  nb.textContent = SES.done >= SES_LEN ? "See Results →" : "Continue →";
  nb.style.display = "block";
}

function showFeedback(ok) {
  const q = CUR;
  const cls = ok ? "ok" : "err";
  const icon = ok ? "✓ Correct!" : `✗ The answer was <strong>${q.answer}</strong>`;
  document.getElementById("fb-area").innerHTML = `
    <div class="fb ${cls}">
      <div class="fb-result ${cls}">${icon}</div>
      <div class="fb-sent">${q.full}</div>
      <div class="fb-rule">${q.rule}</div>
      ${q.notes ? `<div class="fb-notes">${q.notes}</div>` : ""}
    </div>`;
  document.getElementById("fb-area").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ─────────────────────────────────────────────────────────────────────────────
// MODE TOGGLE
// ─────────────────────────────────────────────────────────────────────────────
function toggleMode() {
  MODE = MODE === "mc" ? "type" : "mc";
  if (CUR && !DONE) renderQ();
}

function toggleTrans() {
  HIDE_TRANS = !HIDE_TRANS;
  const transEl = document.getElementById("q-trans");
  transEl.style.display = HIDE_TRANS ? "none" : "";
  document.getElementById("trans-tog").textContent = HIDE_TRANS ? "Show translation" : "Hide translation";
}


// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function showSummary() {
  const pct = SES.done ? Math.round(SES.ok / SES.done * 100) : 0;
  document.getElementById("sum-pct").textContent = pct + "%";
  document.getElementById("sum-frac").textContent = `${SES.ok} of ${SES.done} correct`;
  const msg = pct >= 80 ? "Strong session — keep the momentum." :
              pct >= 60 ? "Good work. The tricky ones are queued for more practice." :
                          "Rough session — but that's what the drill is for. Those questions come back.";
  const mas = ACTIVE_QS.filter(q => score(APP, q.id) >= 4).length;
  document.getElementById("sum-detail").innerHTML = `
    <p class="sum-msg">${msg}</p>
    <div class="sgrid">
      <div class="scard"><div class="val">${APP.answered}</div><div class="lbl">Total</div></div>
      <div class="scard"><div class="val">${mas}</div><div class="lbl">Mastered</div></div>
      <div class="scard"><div class="val">${ACTIVE_QS.length}</div><div class="lbl">Pool</div></div>
    </div>`;
  show("summary");
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showHome();
