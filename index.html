<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slovak Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script>
// Apply theme immediately from saved tweaks or default
(function() {
  try {
    var saved = localStorage.getItem('__tweaks__');
    var theme = saved ? (JSON.parse(saved).theme || 'saffron') : 'saffron';
    if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', theme);
  } catch(e) {
    document.documentElement.setAttribute('data-theme', 'saffron');
  }
})();
</script>

<style>
/* ═══════════════════════════════════════════════════════
   THEME TOKENS — swapped by Tweaks
═══════════════════════════════════════════════════════ */
:root {
  --bg: #0f0f1a;
  --bg2: #181828;
  --card: #1e1e32;
  --card2: #252540;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0ff;
  --text2: #9898c0;
  --text3: #6060a0;
  --heading: #c4b5fd;
  --accent: #a78bfa;
  --accent2: #38bdf8;
  --accent-bg: rgba(167,139,250,0.15);
  --ok: #34d399;
  --ok-bg: rgba(52,211,153,0.12);
  --err: #f87171;
  --err-bg: rgba(248,113,113,0.12);
  --streak: #fbbf24;
  --streak-bg: rgba(251,191,36,0.15);
  --btn-text: #0f0f1a;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  --r: 18px;
  --rs: 12px;
  --font: 'Outfit', sans-serif;
  --font-q: 'Lora', serif;
  --prog-bg: rgba(255,255,255,0.08);
}

/* THEME: Saffron (day mode — forest bg, white text, saffron title+buttons) */
[data-theme="saffron"] {
  --bg: #1c4a2e;
  --bg2: #163d24;
  --card: #0f2d1a;
  --card2: #122814;
  --border: rgba(255,255,255,0.1);
  --text: #edfbf2;
  --text2: #8fcca0;
  --text3: #5a9970;
  --heading: #e07b00;
  --accent: #c8a000;
  --accent2: #e07b00;
  --accent-bg: rgba(224,123,0,0.15);
  --ok: #34d399;
  --ok-bg: rgba(52,211,153,0.12);
  --err: #fb7185;
  --err-bg: rgba(251,113,133,0.12);
  --streak: #fbbf24;
  --streak-bg: rgba(251,191,36,0.15);
  --btn-text: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
  --prog-bg: rgba(255,255,255,0.08);
}

/* THEME: Forest */
[data-theme="forest"] {
  --bg: #0d1f15;
  --bg2: #122b1c;
  --card: #183825;
  --card2: #1e4a2e;
  --border: rgba(255,255,255,0.07);
  --text: #e8f5ec;
  --text2: #7ab88a;
  --text3: #4a7a58;
  --heading: #a3e635;
  --accent: #a3e635;
  --accent2: #34d399;
  --accent-bg: rgba(163,230,53,0.12);
  --ok: #34d399;
  --ok-bg: rgba(52,211,153,0.12);
  --err: #fb7185;
  --err-bg: rgba(251,113,133,0.12);
  --streak: #fbbf24;
  --streak-bg: rgba(251,191,36,0.12);
  --btn-text: #0d1f15;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  display: flex;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
}

#app {
  width: 100%;
  max-width: 480px;
  padding: 0 16px calc(32px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  min-height: 100svh;
}

/* ═══════════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════════ */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
}
.hdr-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}
.back-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
  font-size: 18px;
  transition: background 0.15s, transform 0.1s;
}
.back-btn:active { transform: scale(0.94); }

/* ═══════════════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════════════ */
.home-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 20px;
}
.home-hero-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.home-hero-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.home-hero-title-row h2 {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.8px;
  line-height: 1;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.home-flag {
  font-size: 26px;
  line-height: 1;
}
.home-hero-sk {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
  align-self: flex-start;
  padding-top: 2px;
}
.home-hero-sub {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.5;
  margin-top: 2px;
}
[data-theme="saffron"] .home-hero-sub { color: #ffffff; }

/* ═══════════════════════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════════════════════ */
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 20px 0 10px;
}
[data-theme="saffron"] .weak-row {
  background: linear-gradient(135deg, #0f4a4a, #0a3535);
  border-color: rgba(255,255,255,0.08);
}

/* ═══════════════════════════════════════════════════════
   STATS GRID
═══════════════════════════════════════════════════════ */
.sgrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.scard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 16px 8px 14px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
}
[data-theme="saffron"] .scard {
  background: linear-gradient(135deg, #0f4a4a, #0a3535);
  border-color: rgba(255,255,255,0.1);
}
.scard .val {
  font-size: 28px;
  font-weight: 800;
  color: var(--heading);
  line-height: 1;
  letter-spacing: -1px;
}
.scard .lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ═══════════════════════════════════════════════════════
   WEAK POINTS
═══════════════════════════════════════════════════════ */
.weak-hdr {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.weak-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.weak-row .topic {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  margin-right: 10px;
  color: var(--text);
}
.dots { display: flex; gap: 4px; }
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
}
.dot.on { background: var(--accent); }
.dot.bad { background: var(--err); }

/* ═══════════════════════════════════════════════════════
   DRILL CARDS
═══════════════════════════════════════════════════════ */
.drill-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s;
  position: relative;
  overflow: hidden;
}
.drill-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.7;
}

/* ═══════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════ */
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border-radius: var(--r);
  border: none;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s, box-shadow 0.12s;
  text-align: center;
  letter-spacing: 0.1px;
}
.btn:active { transform: scale(0.98); opacity: 0.9; }

.btn-primary {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: var(--btn-text);
  margin-bottom: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.btn-danger {
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  font-size: 13px;
}

/* ═══════════════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════════════ */
.prog {
  height: 4px;
  background: var(--prog-bg);
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ═══════════════════════════════════════════════════════
   QUIZ HEADER
═══════════════════════════════════════════════════════ */
.quiz-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 0 12px;
}
.sess-info {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  flex: 1;
  text-align: center;
}
[data-theme="saffron"] .sess-info { color: #ffffff; }
.streak {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--streak-bg);
  color: var(--streak);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════════════
   QUESTION CARD
═══════════════════════════════════════════════════════ */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 20px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
[data-theme="saffron"] .q-card {
  background: linear-gradient(135deg, #0f4a4a, #0a3535);
  border-color: rgba(255,255,255,0.1);
}
.q-tag {
  display: inline-flex;
  align-items: center;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 16px;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}
.q-sent {
  font-family: var(--font-q);
  font-size: 22px;
  line-height: 1.6;
  font-weight: 400;
  color: var(--text);
}
.blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 3px solid var(--accent);
  padding: 0 4px;
  color: transparent;
  user-select: none;
  vertical-align: baseline;
}
.q-trans {
  font-size: 13px;
  color: var(--text2);
  font-style: italic;
  margin-top: 10px;
  font-family: var(--font-q);
}

/* ═══════════════════════════════════════════════════════
   MODE ROW
═══════════════════════════════════════════════════════ */
.mode-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  padding: 0 2px;
}
.mode-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.mode-btn:hover { color: var(--text2); }
[data-theme="saffron"] .mode-btn { color: #ffffff; }
[data-theme="saffron"] .mode-btn:hover { color: rgba(255,255,255,0.7); }

/* ═══════════════════════════════════════════════════════
   ANSWER OPTIONS
═══════════════════════════════════════════════════════ */
.opts { display: grid; gap: 8px; margin-top: 16px; }
.opt {
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: var(--rs);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: border-color 0.12s, background 0.12s, transform 0.1s;
  text-align: left;
  width: 100%;
}
[data-theme="saffron"] .opt {
  background: linear-gradient(135deg, #083030, #0a3d3d);
  border-color: rgba(255,255,255,0.08);
}
[data-theme="saffron"] .opt:hover:not(:disabled) {
  background: linear-gradient(135deg, #0a3838, #0d4545);
  border-color: rgba(255,255,255,0.18);
}
.opt:active:not(:disabled) { transform: scale(0.99); }
.opt:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-bg);
}
.opt-lbl {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  background: var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  transition: background 0.12s, color 0.12s;
}
.opt.ok {
  background: var(--ok-bg);
  border-color: var(--ok);
}
.opt.ok .opt-lbl { background: var(--ok); color: #fff; }
.opt.err {
  background: var(--err-bg);
  border-color: var(--err);
}
.opt.err .opt-lbl { background: var(--err); color: #fff; }
.opt:disabled { cursor: default; }

/* ═══════════════════════════════════════════════════════
   TYPE INPUT
═══════════════════════════════════════════════════════ */
.type-row { display: flex; gap: 8px; margin-top: 16px; }
.type-in {
  flex: 1;
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: var(--rs);
  padding: 14px 16px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.type-in::placeholder { color: var(--text3); }
.type-in:focus { border-color: var(--accent); background: var(--accent-bg); }
.type-in.ok { border-color: var(--ok); background: var(--ok-bg); }
.type-in.err { border-color: var(--err); background: var(--err-bg); }
.check-btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: var(--btn-text);
  border: none;
  border-radius: var(--rs);
  padding: 14px 20px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
  white-space: nowrap;
}
.check-btn:active { transform: scale(0.97); }

/* ═══════════════════════════════════════════════════════
   FEEDBACK
═══════════════════════════════════════════════════════ */
.fb {
  border-radius: var(--r);
  padding: 20px;
  margin-top: 8px;
  animation: slideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.fb.ok { background: var(--ok-bg); border-color: var(--ok); }
.fb.err { background: var(--err-bg); border-color: var(--err); }

.fb-result {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.fb-result::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  flex-shrink: 0;
}
.fb-result.ok { color: var(--ok); }
.fb-result.ok::before { background: var(--ok); content: '✓'; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }
.fb-result.err { color: var(--err); }
.fb-result.err::before { background: var(--err); content: '✗'; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }

.fb-sent {
  font-family: var(--font-q);
  font-size: 16px;
  font-weight: 400;
  padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--rs);
  margin-bottom: 12px;
  line-height: 1.6;
  color: var(--text);
}
[data-theme="saffron"] .fb-sent { background: rgba(0,0,0,0.04); }

.ans {
  color: var(--ok);
  font-weight: 700;
  text-decoration: underline;
  text-decoration-color: var(--ok);
}
.fb-rule {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}
.fb-notes {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 10px;
}

/* ═══════════════════════════════════════════════════════
   NEXT BUTTON
═══════════════════════════════════════════════════════ */
#next-btn {
  margin-top: 10px;
  animation: slideUp 0.2s ease;
}

/* ═══════════════════════════════════════════════════════
   SUMMARY SCREEN
═══════════════════════════════════════════════════════ */
.sum-score {
  text-align: center;
  padding: 32px 0 24px;
}
.sum-ring {
  position: relative;
  width: 130px;
  height: 130px;
  margin: 0 auto 16px;
}
.sum-ring svg { transform: rotate(-90deg); }
.sum-ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
.sum-ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.sum-ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.sum-pct {
  font-size: 36px;
  font-weight: 900;
  color: var(--heading);
  letter-spacing: -1px;
  line-height: 1;
}
.sum-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.sum-frac {
  font-size: 15px;
  color: var(--text2);
  margin-top: 6px;
  font-weight: 500;
}
.sum-msg {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text2);
  margin-bottom: 20px;
  text-align: center;
  padding: 0 8px;
}

/* ── Translation Practice ── */
.tr-level-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.btn-level { padding: 12px 4px; font-size: 13px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); color: var(--btn-text); border: none; border-radius: var(--rs); cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); transition: transform 0.12s, opacity 0.12s; }
.btn-level:active { opacity: 0.75; transform: scale(0.98); }
.tr-en { font-size: 21px; font-weight: 600; line-height: 1.5; margin-bottom: 14px; color: var(--text); }
.tr-hint { font-size: 13px; color: var(--text2); background: var(--bg2); border-radius: var(--rs); padding: 8px 12px; margin-bottom: 14px; line-height: 1.5; }
.tr-textarea { width: 100%; border: 2px solid var(--border); border-radius: var(--rs); padding: 13px 14px; font-size: 16px; min-height: 88px; resize: none; background: transparent; color: var(--text); outline: none; margin-bottom: 10px; font-family: inherit; transition: border-color .15s; }
.tr-textarea:focus { border-color: var(--accent); }
.tr-textarea:disabled { opacity: 0.75; }
.tr-answer-card { background: var(--ok-bg); border: 1.5px solid var(--ok); border-radius: var(--r); padding: 16px 18px; margin-top: 12px; animation: fadeUp .2s ease; }
.tr-answer-label { font-size: 11px; font-weight: 700; color: var(--ok); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.tr-answer-sk { font-size: 20px; font-weight: 600; line-height: 1.5; color: var(--text); margin-bottom: 8px; }
.tr-answer-hint { font-size: 12px; color: var(--text2); }
.tr-mark-row { display: flex; gap: 10px; margin-top: 12px; }
.btn-got-it  { flex: 1; background: var(--ok);  color: #fff; border: none; border-radius: var(--rs); padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-not-quite { flex: 1; background: var(--err); color: #fff; border: none; border-radius: var(--rs); padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div id="app">

  <!-- ═══ HOME ═══ -->
  <div id="home" class="screen">
    <div class="home-hero">
      <div class="home-hero-left">
        <div class="home-hero-title-row">
          <h2>Slovak Drill</h2>
        </div>
        <div class="home-hero-sub">Grammar &amp; vocabulary</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px;line-height:1">🌙</button>
        <div class="home-hero-sk">SK</div>
      </div>
    </div>

    <div class="section-label">Grammar Drill</div>
    <div class="sgrid">
      <div class="scard"><div class="val" id="s-done">0</div><div class="lbl">Answered</div></div>
      <div class="scard"><div class="val" id="s-acc">—</div><div class="lbl">Accuracy</div></div>
      <div class="scard"><div class="val" id="s-mastered">0</div><div class="lbl">Mastered</div></div>
    </div>
    <div id="weak-sec" style="margin-bottom:12px;display:none">
      <div class="weak-hdr">Needs Work</div>
      <div id="weak-list"></div>

    <div class="section-label">Vocabulary Practice</div>
    <div class="sgrid">
      <div class="scard"><div class="val" id="v-done">0</div><div class="lbl">Answered</div></div>
      <div class="scard"><div class="val" id="v-acc">—</div><div class="lbl">Accuracy</div></div>
      <div class="scard"><div class="val" id="v-mastered">0</div><div class="lbl">Mastered</div></div>
    </div>
    <button class="btn btn-primary" onclick="startSession('vocab')">Vocabulary Practice <span style="opacity:0.75;font-weight:500;font-size:13px">· 10 questions</span></button>

    <div class="section-label">Translation Practice</div>
    <div class="sgrid">
      <div class="scard"><div class="val" id="tr-done">0</div><div class="lbl">Done</div></div>
      <div class="scard"><div class="val" id="tr-acc">—</div><div class="lbl">Got it</div></div>
      <div class="scard"><div class="val" id="tr-mastered">0</div><div class="lbl">Mastered</div></div>
    </div>
    <div class="tr-level-btns">
      <button class="btn-level" onclick="startTransSession('beginner')">Beginner</button>
      <button class="btn-level" onclick="startTransSession('intermediate')">Intermediate</button>
      <button class="btn-level" onclick="startTransSession('advanced')">Advanced</button>
      <button class="btn-level" onclick="startTransSession('very_advanced')">Very Advanced</button>
    </div>

    <div style="height:16px"></div>
    <button class="btn btn-danger" onclick="if(confirm('Reset all progress?')){resetProg();}">Reset Progress</button>
  </div>

  <!-- ═══ TRANSLATE ═══ -->
  <div id="translate" class="screen">
    <div class="quiz-hdr">
      <button class="back-btn" onclick="endTransSession()">←</button>
      <span class="sess-info" id="tr-count"></span>
      <span id="tr-level-lbl" style="font-size:13px;color:var(--text2)"></span>
    </div>
    <div class="prog"><div class="prog-fill" id="tr-prog-fill"></div></div>

    <div class="mode-row">
      <button class="mode-btn" id="hint-tog" onclick="toggleHints()">Hide hint</button>
    </div>

    <div class="q-card">
      <div class="tr-en" id="tr-en"></div>
      <div class="tr-hint" id="tr-hint"></div>
      <textarea class="tr-textarea" id="tr-input" placeholder="Type your Slovak translation…"></textarea>
      <button class="btn btn-primary" id="tr-reveal-btn" onclick="revealT()">Reveal answer</button>
    </div>

    <div id="tr-answer-area"></div>
    <div class="tr-mark-row" id="tr-mark-row" style="display:none">
      <button class="btn-got-it"   onclick="markT(true)">✓ Got it</button>
      <button class="btn-not-quite" onclick="markT(false)">✗ Not quite</button>
    </div>
  </div>

  <!-- ═══ QUIZ ═══ -->
  <div id="quiz" class="screen">
    <div class="quiz-hdr">
      <button class="back-btn" onclick="endSession()">←</button>
      <span class="sess-info" id="q-count"></span>
      <span id="streak-el" style="min-width:60px;text-align:right"></span>
    </div>
    <div class="prog"><div class="prog-fill" id="prog-fill"></div></div>

    <div class="mode-row">
      <button class="mode-btn" id="trans-tog" onclick="toggleTrans()">Hide translation</button>
      <button class="mode-btn" onclick="toggleMode()">→ <span id="mode-lbl">Typed input</span></button>
    </div>

    <div class="q-card">
      <div class="q-tag" id="q-tag"></div>
      <div class="q-sent" id="q-sent"></div>
      <div class="q-trans" id="q-trans"></div>
      <div class="opts" id="mc-opts"></div>
      <div class="type-row" id="type-row" style="display:none">
        <input id="type-in" class="type-in" placeholder="Type your answer…"
          onkeydown="if(event.key==='Enter')checkTyped()">
        <button class="check-btn" onclick="checkTyped()">Check</button>
      </div>
    </div>

    <div id="fb-area"></div>
    <button class="btn btn-primary" id="next-btn" style="display:none;margin-top:10px" onclick="nextQ()">Continue →</button>
  </div>

  <!-- ═══ SUMMARY ═══ -->
  <div id="summary" class="screen">
    <div class="hdr">
      <div class="hdr-title">Session Complete</div>
    </div>

    <div class="sum-score">
      <div class="sum-ring">
        <svg viewBox="0 0 130 130" width="130" height="130">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="var(--accent)"/>
              <stop offset="100%" stop-color="var(--accent2)"/>
            </linearGradient>
          </defs>
          <circle class="sum-ring-track" cx="65" cy="65" r="56"/>
          <circle class="sum-ring-fill" id="sum-ring-fill" cx="65" cy="65" r="56"
            stroke-dasharray="351.86"
            stroke-dashoffset="351.86"/>
        </svg>
        <div class="sum-ring-text">
          <div class="sum-pct" id="sum-pct">0%</div>
          <div class="sum-label">Score</div>
        </div>
      </div>
      <div class="sum-frac" id="sum-frac"></div>
    </div>

    <div style="padding: 0 0 16px">
      <p class="sum-msg" id="sum-msg"></p>
    </div>

    <div class="sgrid" id="sum-stats"></div>

    <div style="height:20px"></div>
    <button class="btn btn-primary" id="sum-again-btn" onclick="startSession(ACTIVE_KEY === VOCAB_KEY ? 'vocab' : 'grammar')">Another Session</button>
    <button class="btn btn-secondary" onclick="showHome()">Home</button>
  </div>

</div><!-- #app -->

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "saffron",
  "questionFont": "serif",
  "roundness": "large",
  "animations": true
}/*EDITMODE-END*/;

function TweaksApp() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    // Theme
    if (tweaks.theme === 'dark') root.removeAttribute('data-theme');
    else root.setAttribute('data-theme', tweaks.theme);
    // Font
    const app = document.getElementById('app');
    app.style.setProperty('--font-q', tweaks.questionFont === 'serif' ? "'Lora', serif" : "'Outfit', sans-serif");
    // Roundness
    const r = tweaks.roundness === 'large' ? '18px' : tweaks.roundness === 'medium' ? '12px' : '6px';
    const rs = tweaks.roundness === 'large' ? '12px' : tweaks.roundness === 'medium' ? '8px' : '4px';
    root.style.setProperty('--r', r);
    root.style.setProperty('--rs', rs);
    // Animations
    root.style.setProperty('--anim-speed', tweaks.animations ? '1' : '0');
  }, [tweaks]);

  return (
    <TweaksPanel>
      <TweakSection title="Theme">
        <TweakRadio
          label="Color Scheme"
          value={tweaks.theme}
          options={[
            { value: 'saffron', label: '☀️ Day' },
            { value: 'dark', label: '🌙 Night' },
          ]}
          onChange={v => setTweak('theme', v)}
        />
      </TweakSection>
      <TweakSection title="Typography">
        <TweakRadio
          label="Question Font"
          value={tweaks.questionFont}
          options={[
            { value: 'serif', label: 'Serif' },
            { value: 'sans', label: 'Sans' },
          ]}
          onChange={v => setTweak('questionFont', v)}
        />
      </TweakSection>
      <TweakSection title="Layout">
        <TweakRadio
          label="Corner Radius"
          value={tweaks.roundness}
          options={[
            { value: 'large', label: 'Round' },
            { value: 'medium', label: 'Medium' },
            { value: 'sharp', label: 'Sharp' },
          ]}
          onChange={v => setTweak('roundness', v)}
        />
      </TweakSection>
      <TweakSection title="Motion">
        <TweakToggle
          label="Animations"
          value={tweaks.animations}
          onChange={v => setTweak('animations', v)}
        />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);
</script>
<div id="tweaks-root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────────────────────────────────────────────
const QS = [
  { id:"stv1", tag:"stáť za", sentence:"Stojí to ___ to.", answer:"za", distractors:["do","na","pre"], full:"Stojí to <b class='ans'>za</b> to.", translation:"It is worth it.", rule:"<b>stáť za + accusative</b> = to be worth X. <em>Za</em> is always the preposition; any accusative noun fills the slot after it: stáť za úsilie, za pozornosť.", notes:"Learners often think 'to' is part of the phrase — it's just the default pronoun for 'it'. The essential word is <em>za</em>." },
  { id:"stv2", tag:"stáť za", sentence:"Nestojí to za ___.", answer:"nič", distractors:["nikto","nikde","nikdy"], full:"Nestojí to za <b class='ans'>nič</b>.", translation:"It is worth nothing.", rule:"<b>stáť za + accusative.</b> <em>Nič</em> (nothing) fills the accusative slot here as the measure of worth.", notes:"Compare: nestojí to za zmienku = it's not worth mentioning; stojí to za úsilie = it's worth the effort." },
  { id:"stv3", tag:"stáť za", sentence:"Stojí to ___ námahu?", answer:"za", distractors:["do","na","pre"], full:"Stojí to <b class='ans'>za</b> námahu?", translation:"Is it worth the trouble?", rule:"<b>stáť za + accusative.</b> The preposition is always <em>za</em> — it never varies.", notes:"" },
  { id:"trb1", tag:"treba + infinitive", sentence:"Okrem gramatiky treba ___ aj kultúru.", answer:"poznať", distractors:["poznáš","poznajú","poznáme"], full:"Okrem gramatiky treba <b class='ans'>poznať</b> aj kultúru.", translation:"Besides grammar, one also needs to know culture.", rule:"<b>treba is impersonal</b> — it takes an <em>infinitive</em> directly, never a conjugated verb.", notes:"treba poznáš is ungrammatical. Compare: musíš poznať (you must know — personal) vs treba poznať (one needs to know — impersonal)." },
  { id:"trb2", tag:"treba + infinitive", sentence:"Treba to ___.", answer:"vedieť", distractors:["vie","viem","vedia"], full:"Treba to <b class='ans'>vedieť</b>.", translation:"One needs to know this.", rule:"<b>treba + infinitive.</b> Infinitives end in <em>-ť</em>. Conjugated forms are never possible after treba.", notes:"The 'you' in English translations is just how English handles impersonals — there is no subject in the Slovak." },
  { id:"asp1", tag:"Aspect: imperfective vs perfective", sentence:"Ona ___ a povedala: Uži si to, kým môžeš.", answer:"usmievala sa", distractors:["usmiala sa","usmeje sa","usmieva sa"], full:"Ona <b class='ans'>usmievala sa</b> a povedala: Uži si to, kým môžeš.", translation:"She was smiling and said: Enjoy it while you can.", rule:"<b>Imperfective past = ongoing background state.</b>", notes:"Use imperfective when the action is the backdrop/context for something else." },
  { id:"asp2", tag:"Aspect: imperfective vs perfective", sentence:"Vybehol z domu a ___.", answer:"kričal", distractors:["zakričal","kričí","kričíme"], full:"Vybehol z domu a <b class='ans'>kričal</b>.", translation:"He ran out of the house shouting.", rule:"<b>Perfective + a + imperfective.</b> <em>Vybehol</em> (perf) = the single event. <em>Kričal</em> (imperf) = the shouting was ongoing.", notes:"Slovak 'verb + a + imperfective verb' → English 'verb + -ing participle'." },
  { id:"asp3", tag:"Aspect: imperfective vs perfective", sentence:"Snažím sa ___ každý problém hneď.", answer:"riešiť", distractors:["vyriešiť","riešenie","vyriešenie"], full:"Snažím sa <b class='ans'>riešiť</b> každý problém hneď.", translation:"I try to deal with every problem immediately.", rule:"<b>riešiť (imperfective)</b> = the ongoing process. <em>Vyriešiť (perfective)</em> = to solve completely.", notes:"imperfective riešiť = dealing with; perfective vyriešiť = having solved." },
  { id:"asp4", tag:"Aspect: imperfective vs perfective", sentence:"Ešte som ne___.", answer:"dojedol", distractors:["jedol","jedal","zjedol"], full:"Ešte som ne<b class='ans'>dojedol</b>.", translation:"I haven't finished eating yet.", rule:"<b>ešte + negative perfective past</b> = not yet completed, but intending to.", notes:"Nedojedol ≠ nejedol. Nedojedol = didn't finish eating. Nejedol = didn't eat at all." },
  { id:"nic1", tag:"nič vs žiadny", sentence:"Nepijem ___.", answer:"nič", distractors:["žiadny","žiadne","žiadna"], full:"Nepijem <b class='ans'>nič</b>.", translation:"I drink nothing.", rule:"<b>nič = nothing (pronoun)</b> — stands alone, replaces a noun entirely.", notes:"Compare: nepijem nič vs nepijem žiadny čaj." },
  { id:"nic2", tag:"nič vs žiadny", sentence:"Nepijem ___ čaj.", answer:"žiadny", distractors:["nič","žiadne","žiadna"], full:"Nepijem <b class='ans'>žiadny</b> čaj.", translation:"I drink no tea.", rule:"<b>žiadny = no/not any (determiner)</b> — modifies a noun.", notes:"žiadny (masc), žiadna (fem), žiadne (neuter)." },
  { id:"nic3", tag:"nič vs žiadny", sentence:"___ neboli v obchode.", answer:"Žiadne", distractors:["Nič","Nikto","Nikde"], full:"<b class='ans'>Žiadne</b> neboli v obchode.", translation:"There weren't any in the shop.", rule:"<b>žiadne (neuter plural)</b> = there weren't any of the specific things.", notes:"" },
  { id:"nic4", tag:"nič vs žiadny", sentence:"Nie je ___ problém.", answer:"žiadny", distractors:["nič","nikto","nikdy"], full:"Nie je <b class='ans'>žiadny</b> problém.", translation:"There is no problem.", rule:"<b>žiadny (masculine)</b> modifies <em>problém</em>.", notes:"Paradigm: žiadny problém (masc), žiadna šanca (fem), žiadne peniaze (neuter pl)." },
  { id:"dbl1", tag:"Double negative", sentence:"Celú noc nepovedal ani ___.", answer:"slovo", distractors:["slové","slovom","slovách"], full:"Celú noc nepovedal ani <b class='ans'>slovo</b>.", translation:"He didn't say a single word all night.", rule:"<b>ani = 'not even a single'.</b> Verb must also be negative.", notes:"ani = negative pole: ani jeden, ani raz, ani trochu." },
  { id:"dbl2", tag:"Double negative", sentence:"Čakali sme hodinu pri vchode, ale nikto ___.", answer:"neprišiel", distractors:["prišiel","príde","prichádza"], full:"Čakali sme hodinu pri vchode, ale nikto <b class='ans'>neprišiel</b>.", translation:"We waited an hour at the entrance, but nobody came.", rule:"<b>Double negative is obligatory in Slovak.</b>", notes:"Rule: nikto, nič, nikdy, nikde, žiadny, ani — verb always takes ne-." },
  { id:"sas1", tag:"Reflexive: sa vs si", sentence:"Každý deň ___ učím niečo nové.", answer:"sa", distractors:["si","mu","jej"], full:"Každý deň <b class='ans'>sa</b> učím niečo nové.", translation:"Every day I learn something new.", rule:"<b>sa = reflexive accusative.</b> učiť sa = teach oneself = learn.", notes:"" },
  { id:"sas2", tag:"Reflexive: sa vs si", sentence:"Každý deň ___ tiež uvedomujem, čo ešte neviem.", answer:"si", distractors:["sa","mu","ho"], full:"Každý deň <b class='ans'>si</b> tiež uvedomujem, čo ešte neviem.", translation:"Every day I also realise what I still don't know.", rule:"<b>si = reflexive dative.</b> uvedomiť si = realise.", notes:"Key si verbs: uvedomiť si, predstaviť si, pamätať si, myslieť si." },
  { id:"sas3", tag:"Reflexive: sa vs si", sentence:"Neviem ___ to predstaviť.", answer:"si", distractors:["sa","mu","jej"], full:"Neviem <b class='ans'>si</b> to predstaviť.", translation:"I can't picture / imagine it.", rule:"<b>predstaviť si</b> = to imagine. Without si: predstaviť niekoho = to introduce someone.", notes:"" },
  { id:"sas4", tag:"Reflexive: sa vs si", sentence:"Zobral som ___ príliš veľa.", answer:"si", distractors:["sa","ho","to"], full:"Zobral som <b class='ans'>si</b> príliš veľa.", translation:"I took on too much.", rule:"<b>Dative si of benefit.</b> Zobrať si = take for yourself.", notes:"kúpiť si, urobiť si, dať si kávu — si shifts meaning toward 'for myself'." },
  { id:"est1", tag:"ešte vs stále", sentence:"A ___ stále neviem presne prečo.", answer:"ešte", distractors:["len","už","ani"], full:"A <b class='ans'>ešte</b> stále neviem presne prečo.", translation:"And even now I still don't know exactly why.", rule:"<b>ešte stále</b> = 'even still / and yet still'. Adds mild surprise.", notes:"" },
  { id:"est2", tag:"ešte vs stále", sentence:"___ som nedojedol.", answer:"Ešte", distractors:["Stále","Vždy","Nikdy"], full:"<b class='ans'>Ešte</b> som nedojedol.", translation:"I haven't finished eating yet.", rule:"<b>ešte + negative</b> = not yet, but intending to continue.", notes:"" },
  { id:"est3", tag:"ešte vs stále", sentence:"Som ___ unavený.", answer:"stále", distractors:["ešte","len","vždy"], full:"Som <b class='ans'>stále</b> unavený.", translation:"I am still tired.", rule:"<b>stále = continuously / as before</b> — the state is unchanged.", notes:"" },
  { id:"adj1", tag:"Adjective agreement", sentence:"Chcem zjesť cel___ jedlo.", answer:"celé", distractors:["celý","celá","celom"], full:"Chcem zjesť <b class='ans'>celé</b> jedlo.", translation:"I want to eat the whole meal.", rule:"<b>Jedlo is neuter → neuter form celé.</b>", notes:"Masculine = celý, feminine = celá, neuter = celé." },
  { id:"adj2", tag:"Adjective agreement", sentence:"Kokos___ mlieko.", answer:"kokosové", distractors:["kokosový","kokosová","kokosovom"], full:"<b class='ans'>Kokosové</b> mlieko.", translation:"Coconut milk.", rule:"<b>Mlieko is neuter → neuter form kokosové.</b>", notes:"" },
  { id:"adj3", tag:"Adjective agreement", sentence:"Dnešn___ tréning bol ťažký.", answer:"dnešný", distractors:["dnešné","dnešnej","dnešná"], full:"<b class='ans'>Dnešný</b> tréning bol ťažký.", translation:"Today's training was difficult.", rule:"<b>Tréning is masculine → dnešný.</b>", notes:"" },
  { id:"adj4", tag:"Adjective agreement", sentence:"Prvé písomné precvičenie je ___.", answer:"dnes", distractors:["dneš","dnešný","dnešné"], full:"Prvé písomné precvičenie je <b class='ans'>dnes</b>.", translation:"The first writing practice is today.", rule:"<b>dnes = today (adverb).</b> Never changes form.", notes:"" },

// ── PASTE NEW TRANSLATION SENTENCES HERE ─────────────────────────────────────
// One sentence per line, tab-separated. Lines starting with # are ignored.
// Fields: id [TAB] level [TAB] english [TAB] slovak [TAB] hint
// level must be: beginner | intermediate | advanced | very_advanced
// Example:
// ts_x1	intermediate	She is tired but happy.	Je unavená, ale šťastná.	ale = but (contrast); unavená, šťastná — fem. nominative
const USER_TS = `
`;
// ─────────────────────────────────────────────────────────────────────────────
for (const line of USER_TS.split('\n')) {
  const t = line.trim();
  if (!t || t.startsWith('#')) continue;
  const [id, level, en, sk, hint] = t.split('\t');
  if (!id || !level || !en || !sk) continue;
  TS.push({ id, level, en, sk, hint: hint || '' });
}

// ─────────────────────────────────────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────────────────────────────────────
const GRAM_KEY  = "sk_drill_v1";
const VOCAB_KEY = "sk_vocab_v1";
const TRANS_KEY = "sk_trans_v1";
let ACTIVE_KEY = GRAM_KEY;

function loadFromKey(k) {
  try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fresh(); }
  catch { return fresh(); }
}
function load() { return loadFromKey(ACTIVE_KEY); }
function fresh() { return { scores: {}, answered: 0, correct: 0 }; }
function save(s) { localStorage.setItem(ACTIVE_KEY, JSON.stringify(s)); }
function score(s, id) { return s.scores[id] ?? 0; }
function updateScore(s, id, ok) {
  const c = score(s, id);
  s.scores[id] = ok ? Math.min(5, c + 1) : Math.max(0, c - 2);
  s.answered = (s.answered || 0) + 1;
  if (ok) s.correct = (s.correct || 0) + 1;
  save(s);
}

// ─────────────────────────────────────────────────────────────────────────────
// QUESTION SELECTION
// ─────────────────────────────────────────────────────────────────────────────
function weight(sc) { return [10, 7, 4, 2, 1, 0.5][Math.min(sc, 5)]; }
function pick(state, recent) {
  const pool = ACTIVE_QS.filter(q => !recent.includes(q.id));
  const arr = pool.length ? pool : ACTIVE_QS;
  const total = arr.reduce((s, q) => s + weight(score(state, q.id)), 0);
  let r = Math.random() * total;
  for (const q of arr) { r -= weight(score(state, q.id)); if (r <= 0) return q; }
  return arr[arr.length - 1];
}

// ─────────────────────────────────────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────────────────────────────────────
let ACTIVE_QS = QS;
let APP = load();
let SES = { done: 0, ok: 0, streak: 0, recent: [] };
let CUR = null;
let MODE = "mc";
let DONE = false;
let HIDE_TRANS = false;
const SES_LEN = 10;

// Translation state
let TAPP = loadFromKey(TRANS_KEY);
let TSES = { done: 0, ok: 0, recent: [] };
let TCUR = null;
let ACTIVE_TS = [];
let SHOW_HINTS = true;
let TRANS_REVEALED = false;

// ─────────────────────────────────────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showHome() { refreshHome(); show("home"); }

function refreshHome() {
  const gapp = loadFromKey(GRAM_KEY);
  const vapp = loadFromKey(VOCAB_KEY);
  const gtot = gapp.answered || 0, gok = gapp.correct || 0;
  const gmas = QS.filter(q => (gapp.scores[q.id] ?? 0) >= 4).length;
  document.getElementById("s-done").textContent = gtot;
  document.getElementById("s-acc").textContent  = gtot ? Math.round(gok / gtot * 100) + "%" : "—";
  document.getElementById("s-mastered").textContent = gmas;
  const vtot = vapp.answered || 0, vok = vapp.correct || 0;
  const vmas = VQS.filter(q => (vapp.scores[q.id] ?? 0) >= 4).length;
  document.getElementById("v-done").textContent = vtot;
  document.getElementById("v-acc").textContent  = vtot ? Math.round(vok / vtot * 100) + "%" : "—";
  document.getElementById("v-mastered").textContent = vmas;
  const weakItems = QS
    .filter(q => gapp.scores[q.id] !== undefined && (gapp.scores[q.id] ?? 0) <= 1)
    .sort((a, b) => (gapp.scores[a.id] ?? 0) - (gapp.scores[b.id] ?? 0))
    .slice(0, 5);
  const sec = document.getElementById("weak-sec");
  if (weakItems.length) {
    sec.style.display = "";
    document.getElementById("weak-list").innerHTML = weakItems.map(q => {
      const sc = gapp.scores[q.id] ?? 0;
      const dots = [0,1,2,3,4].map(i =>
        `<div class="dot ${i < sc ? 'on' : (sc === 0 ? 'bad' : '')}"></div>`).join("");
      return `<div class="weak-row"><div class="topic">${q.tag}</div><div class="dots">${dots}</div></div>`;
    }).join("");
  } else { sec.style.display = "none"; }
  const tapp = loadFromKey(TRANS_KEY);
  const ttot = tapp.answered || 0, tok = tapp.correct || 0;
  const tmas = TS.filter(t => (tapp.scores[t.id] ?? 0) >= 4).length;
  document.getElementById("tr-done").textContent = ttot;
  document.getElementById("tr-acc").textContent  = ttot ? Math.round(tok / ttot * 100) + "%" : "—";
  document.getElementById("tr-mastered").textContent = tmas;
}

function resetProg() {
  localStorage.removeItem(GRAM_KEY);
  localStorage.removeItem(VOCAB_KEY);
  localStorage.removeItem(TRANS_KEY);
  APP = fresh();
  TAPP = loadFromKey(TRANS_KEY);
  refreshHome();
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION
// ─────────────────────────────────────────────────────────────────────────────
function startSession(type) {
  if      (type === 'vocab')   { ACTIVE_QS = VQS; ACTIVE_KEY = VOCAB_KEY; }
  else if (type === 'grammar') { ACTIVE_QS = QS;  ACTIVE_KEY = GRAM_KEY;  }
  APP = load();
  SES = { done: 0, ok: 0, streak: 0, recent: [] };
  show("quiz");
  nextQ();
}

function endSession() { SES.done > 0 ? showSummary() : showHome(); }

function nextQ() {
  DONE = false;
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("fb-area").innerHTML = "";
  if (SES.done >= SES_LEN) { showSummary(); return; }
  CUR = pick(APP, SES.recent);
  SES.recent.push(CUR.id);
  if (SES.recent.length > 8) SES.recent.shift();
  renderQ();
  updateProgress();
}

function updateProgress() {
  document.getElementById("prog-fill").style.width = (SES.done / SES_LEN * 100) + "%";
  document.getElementById("q-count").textContent = `${SES.done + 1} of ${SES_LEN}`;
  document.getElementById("streak-el").innerHTML =
    SES.streak >= 3 ? `<span class="streak">🔥 ${SES.streak}</span>` : "";
}

function renderQ() {
  const tagEl = document.getElementById("q-tag");
  if (ACTIVE_QS === VQS) { tagEl.style.display = "none"; }
  else { tagEl.style.display = ""; tagEl.textContent = CUR.tag; }
  document.getElementById("q-sent").innerHTML =
    CUR.sentence.replace("___", "<span class='blank'>___</span>");
  const transEl = document.getElementById("q-trans");
  transEl.textContent = CUR.translation;
  transEl.style.display = HIDE_TRANS ? "none" : "";
  document.getElementById("trans-tog").textContent = HIDE_TRANS ? "Show translation" : "Hide translation";
  const mc = document.getElementById("mc-opts");
  const tr = document.getElementById("type-row");
  document.getElementById("mode-lbl").textContent = MODE === "mc" ? "Typed input" : "Multiple choice";
  if (MODE === "mc") {
    mc.style.display = ""; tr.style.display = "none";
    const opts = shuffle([CUR.answer, ...CUR.distractors.slice(0, 3)]);
    const esc = s => s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    mc.innerHTML = opts.map((o, i) => `
      <button class="opt" data-val="${esc(o)}" onclick="checkMC(this.dataset.val, this)">
        <div class="opt-lbl">${"ABCD"[i]}</div><div>${o}</div>
      </button>`).join("");
  } else {
    mc.style.display = "none"; tr.style.display = "";
    const inp = document.getElementById("type-in");
    inp.value = ""; inp.disabled = false; inp.className = "type-in";
    setTimeout(() => inp.focus(), 80);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ANSWER CHECKING
// ─────────────────────────────────────────────────────────────────────────────
function checkMC(chosen, btn) {
  if (DONE) return;
  DONE = true;
  const ok = chosen === CUR.answer;
  handleAnswer(ok);
  document.querySelectorAll(".opt").forEach(b => {
    b.disabled = true;
    const txt = b.querySelector("div:last-child").textContent;
    if (txt === CUR.answer) b.classList.add("ok");
    else if (b === btn && !ok) b.classList.add("err");
  });
}

function checkTyped() {
  if (DONE) return;
  const inp = document.getElementById("type-in");
  const val = inp.value.trim();
  if (!val) return;
  DONE = true;
  const ok = val.toLowerCase() === CUR.answer.toLowerCase();
  inp.disabled = true;
  inp.classList.add(ok ? "ok" : "err");
  handleAnswer(ok);
}

function handleAnswer(ok) {
  updateScore(APP, CUR.id, ok);
  SES.done++;
  if (ok) { SES.ok++; SES.streak++; } else { SES.streak = 0; }
  showFeedback(ok);
  updateProgress();
  const nb = document.getElementById("next-btn");
  nb.textContent = SES.done >= SES_LEN ? "See Results →" : "Continue →";
  nb.style.display = "block";
}

function showFeedback(ok) {
  const q = CUR;
  const cls = ok ? "ok" : "err";
  const icon = ok ? "Correct!" : `The answer was <strong>${q.answer}</strong>`;
  document.getElementById("fb-area").innerHTML = `
    <div class="fb ${cls}">
      <div class="fb-result ${cls}">${icon}</div>
      <div class="fb-sent">${q.full}</div>
      <div class="fb-rule">${q.rule}</div>
      ${q.notes ? `<div class="fb-notes">${q.notes}</div>` : ""}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// MODE TOGGLE
// ─────────────────────────────────────────────────────────────────────────────
function toggleMode() {
  MODE = MODE === "mc" ? "type" : "mc";
  if (CUR && !DONE) renderQ();
}
function toggleTrans() {
  HIDE_TRANS = !HIDE_TRANS;
  const transEl = document.getElementById("q-trans");
  transEl.style.display = HIDE_TRANS ? "none" : "";
  document.getElementById("trans-tog").textContent = HIDE_TRANS ? "Show translation" : "Hide translation";
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function showSummary() {
  const pct = SES.done ? Math.round(SES.ok / SES.done * 100) : 0;
  document.getElementById("sum-pct").textContent = pct + "%";
  document.getElementById("sum-frac").textContent = `${SES.ok} of ${SES.done} correct`;
  // Animate ring
  const circumference = 2 * Math.PI * 56;
  const offset = circumference * (1 - pct / 100);
  const ringFill = document.getElementById("sum-ring-fill");
  if (ringFill) {
    setTimeout(() => { ringFill.style.strokeDashoffset = offset; }, 100);
  }
  const msg = pct >= 80 ? "Strong session — keep the momentum." :
              pct >= 60 ? "Good work. The tricky ones are queued for more practice." :
                          "Rough session — but that's what the drill is for. Those questions come back.";
  document.getElementById("sum-msg").textContent = msg;
  const mas = ACTIVE_QS.filter(q => score(APP, q.id) >= 4).length;
  document.getElementById("sum-stats").innerHTML = `
    <div class="scard"><div class="val">${APP.answered}</div><div class="lbl">Total</div></div>
    <div class="scard"><div class="val">${mas}</div><div class="lbl">Mastered</div></div>
    <div class="scard"><div class="val">${ACTIVE_QS.length}</div><div class="lbl">Pool</div></div>`;
  document.getElementById("sum-again-btn").onclick =
    () => startSession(ACTIVE_KEY === VOCAB_KEY ? 'vocab' : 'grammar');
  show("summary");
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ─────────────────────────────────────────────────────────────────────────────
// TRANSLATION PRACTICE
// ─────────────────────────────────────────────────────────────────────────────
function startTransSession(level) {
  ACTIVE_TS = TS.filter(t => t.level === level);
  TAPP = loadFromKey(TRANS_KEY);
  TSES = { done: 0, ok: 0, recent: [], level };
  document.getElementById("tr-level-lbl").textContent =
    level === "beginner" ? "Beginner" : level === "intermediate" ? "Intermediate" : level === "advanced" ? "Advanced" : "Very Advanced";
  show("translate");
  nextT();
}

function endTransSession() { TSES.done > 0 ? showTransSummary() : showHome(); }

function nextT() {
  TRANS_REVEALED = false;
  document.getElementById("tr-answer-area").innerHTML = "";
  document.getElementById("tr-mark-row").style.display = "none";
  document.getElementById("tr-reveal-btn").style.display = "";
  document.getElementById("tr-input").value = "";
  document.getElementById("tr-input").disabled = false;
  if (TSES.done >= SES_LEN) { showTransSummary(); return; }
  TCUR = pickT();
  TSES.recent.push(TCUR.id);
  if (TSES.recent.length > 8) TSES.recent.shift();
  renderT();
  updateTransProgress();
}

function pickT() {
  const weights = [10, 7, 4, 2, 1, 0.5];
  const pool = ACTIVE_TS.filter(t => !TSES.recent.includes(t.id));
  const src = pool.length ? pool : ACTIVE_TS;
  const scored = src.map(t => {
    const sc = TAPP.scores[t.id] ?? 0;
    return { t, w: weights[Math.min(sc, 5)] };
  });
  const total = scored.reduce((s, x) => s + x.w, 0);
  let r = Math.random() * total;
  for (const { t, w } of scored) { r -= w; if (r <= 0) return t; }
  return scored[scored.length - 1].t;
}

function renderT() {
  document.getElementById("tr-en").textContent = TCUR.en;
  const hintEl = document.getElementById("tr-hint");
  hintEl.textContent = TCUR.hint || "";
  hintEl.style.display = (SHOW_HINTS && TCUR.hint) ? "" : "none";
  document.getElementById("tr-input").focus();
}

function updateTransProgress() {
  document.getElementById("tr-prog-fill").style.width = (TSES.done / SES_LEN * 100) + "%";
  document.getElementById("tr-count").textContent = `${TSES.done + 1} of ${SES_LEN}`;
}

function revealT() {
  if (TRANS_REVEALED) return;
  TRANS_REVEALED = true;
  document.getElementById("tr-input").disabled = true;
  document.getElementById("tr-reveal-btn").style.display = "none";
  document.getElementById("tr-answer-area").innerHTML = `
    <div class="tr-answer-card">
      <div class="tr-answer-label">Answer</div>
      <div class="tr-answer-sk">${TCUR.sk}</div>
      ${TCUR.hint ? `<div class="tr-answer-hint">${TCUR.hint}</div>` : ""}
    </div>`;
  document.getElementById("tr-mark-row").style.display = "flex";
}

function markT(ok) {
  if (!TAPP.scores) TAPP.scores = {};
  const prev = TAPP.scores[TCUR.id] ?? 0;
  TAPP.scores[TCUR.id] = ok ? Math.min(prev + 1, 5) : Math.max(prev - 1, 0);
  TAPP.answered = (TAPP.answered || 0) + 1;
  if (ok) TAPP.correct = (TAPP.correct || 0) + 1;
  localStorage.setItem(TRANS_KEY, JSON.stringify(TAPP));
  TSES.done++;
  if (ok) TSES.ok++;
  nextT();
}

function showTransSummary() {
  const pct = TSES.done ? Math.round(TSES.ok / TSES.done * 100) : 0;
  document.getElementById("sum-pct").textContent = pct + "%";
  document.getElementById("sum-frac").textContent = `${TSES.ok} of ${TSES.done} correct`;
  const circumference = 2 * Math.PI * 56;
  const ringFill = document.getElementById("sum-ring-fill");
  if (ringFill) setTimeout(() => { ringFill.style.strokeDashoffset = circumference * (1 - pct / 100); }, 100);
  const msg = pct >= 80 ? "Strong session — keep the momentum." :
              pct >= 60 ? "Good work. The tricky ones are queued for more practice." :
                          "Rough session — but that's what the drill is for. Those sentences come back.";
  document.getElementById("sum-msg").textContent = msg;
  const tmas = ACTIVE_TS.filter(t => (TAPP.scores[t.id] ?? 0) >= 4).length;
  document.getElementById("sum-stats").innerHTML = `
    <div class="scard"><div class="val">${TAPP.answered || 0}</div><div class="lbl">Total</div></div>
    <div class="scard"><div class="val">${tmas}</div><div class="lbl">Mastered</div></div>
    <div class="scard"><div class="val">${ACTIVE_TS.length}</div><div class="lbl">Pool</div></div>`;
  document.getElementById("sum-again-btn").onclick = () => startTransSession(TSES.level);
  show("summary");
}

function toggleHints() {
  SHOW_HINTS = !SHOW_HINTS;
  document.getElementById("hint-tog").textContent = SHOW_HINTS ? "Hide hint" : "Show hint";
  if (TCUR) {
    const hintEl = document.getElementById("tr-hint");
    hintEl.style.display = (SHOW_HINTS && TCUR.hint) ? "" : "none";
    if (TRANS_REVEALED) {
      const ansHint = document.querySelector(".tr-answer-hint");
      if (ansHint) ansHint.style.display = SHOW_HINTS ? "" : "none";
    }
  }
}

// THEME TOGGLE
function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  const next = current === 'saffron' ? 'dark' : 'saffron';
  if (next === 'dark') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
  // persist
  try {
    const saved = JSON.parse(localStorage.getItem('__tweaks__') || '{}');
    saved.theme = next;
    localStorage.setItem('__tweaks__', JSON.stringify(saved));
  } catch(e) {}
}
